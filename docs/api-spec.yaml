openapi: 3.0.3
info:
  title: Cortex Vul Test API
  description: API specification for the User Directory sample application using JSONPlaceholder as a mock backend.
  version: 1.0.0
servers:
  - url: https://jsonplaceholder.typicode.com
    description: Mock Backend Server

paths:
  /users:
    get:
      summary: Retrieve a list of users
      description: Returns a collection of users with their contact and company information.
      operationId: getUsers
      responses:
        '200':
          description: A successful response containing an array of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Server error

components:
  schemas:
    User:
      type: object
      # --- INTENTIONAL MISCONFIGURATION START ---
      view:workspace_titles: true
      required:
        - id
        - name
        - email
        - company
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Leanne Graham"
        username:
          type: string
          example: "Bret"
        email:
          type: string
          format: email
          example: "Sincere@april.biz"
        address:
          $ref: '#/components/schemas/Address'
        phone:
          type: string
          example: "1-770-736-8031 x56442"
        website:
          type: string
          example: "hildegard.org"
        company:
          $ref: '#/components/schemas/Company'

    Address:
      type: object
      properties:
        street:
          type: string
        suite:
          type: string
        city:
          type: string
        zipcode:
          type: string
        geo:
          type: object
          properties:
            lat:
              type: string
            lng:
              type: string

    Company:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Romaguera-Crona"
        catchPhrase:
          type: string
        bs:
          type: string
